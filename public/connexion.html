<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - SorboNexus</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col bg-gradient-to-br from-gray-700 via-gray-800 to-gray-900 text-white">
  <nav class="bg-gray-800 p-4">
    <ul class="flex space-x-4 justify-center">
      <li><a href="index.html" class="inline-block hover:text-gray-400 font-semibold transform transition-transform duration-200 hover:scale-110">Accueil</a></li>
      <li><a href="ressources.html" class="inline-block hover:text-gray-400 transform transition-transform duration-200 hover:scale-110">Ressources</a></li>
      <li><a href="liens-utiles.html" class="inline-block hover:text-gray-400 transform transition-transform duration-200 hover:scale-110">Liens Utiles</a></li>
      <li><a href="conseils.html" class="inline-block hover:text-gray-400 transform transition-transform duration-200 hover:scale-110">Conseils</a></li>
      <li><a href="alumnis.html" class="inline-block hover:text-gray-400 transform transition-transform duration-200 hover:scale-110">Alumnis</a></li>
      <li><a href="connexion.html" class="inline-block hover:text-gray-400 transform text-blue-400 transition-transform duration-200 hover:scale-110">Connexion</a></li>
    </ul>
  </nav>
  <div class="flex flex-1 items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-sm mt-8">
      <h1 class="text-2xl font-bold mb-6 text-center text-purple-300">Connexion</h1>
      <form id="loginForm" class="space-y-4">
        <div>
          <label for="username" class="block mb-1">Nom d'utilisateur</label>
          <input type="text" id="username" class="w-full px-3 py-2 rounded bg-gray-700 text-white focus:outline-none" required>
        </div>
        <div>
          <label for="password" class="block mb-1">Mot de passe</label>
          <input type="password" id="password" class="w-full px-3 py-2 rounded bg-gray-700 text-white focus:outline-none" required>
        </div>
        <button type="submit" class="w-full bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 rounded transition">Se connecter</button>
        <p id="loginMessage" class="text-center text-red-400 mt-2"></p>
      </form>
    </div>
  </div>
  <script src="../src/js/main.js"></script>
</body>
</html>
