<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion - SorboNexus</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        height: 100%;
        min-height: 100%;
        margin: 0;
        padding: 0;
      }
      html {
        /* Make the gradient extremely tall to avoid white borders on long scroll */
        background: linear-gradient(
          135deg,
          #374151 0%,
          #1f2937 60%,
          #111827 100%
        );
        background-attachment: fixed !important;
        background-repeat: no-repeat;
        background-size: 100% 2000vh; /* 20x viewport height for a VERY long gradient */
      }
      body {
        background: transparent;
      }
      nav {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 50;
      }
      main {
        margin-top: 64px; /* Adjust if navbar height changes */
        min-height: calc(100vh - 64px);
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body class="min-h-screen text-white">
    <nav class="bg-gray-800 p-4 shadow-lg">
      <ul class="flex space-x-4">
        <li>
          <a
            href="index.html"
            class="inline-block px-4 py-1 hover:text-gray-400 transform transition-transform duration-200 hover:scale-110"
            >Accueil</a
          >
        </li>
        <li>
          <a
            href="ressources.html"
            class="inline-block px-4 py-1 hover:text-gray-400 transform transition-transform duration-200 hover:scale-110"
            >Ressources</a
          >
        </li>
        <li>
          <a
            href="liens-utiles.html"
            class="inline-block px-4 py-1 hover:text-blue-550 transform transition-transform duration-200 hover:scale-110"
            >Liens Utiles</a
          >
        </li>
        <li>
          <a
            href="conseils.html"
            class="inline-block px-4 py-1 hover:text-gray-400 transform transition-transform duration-200 hover:scale-110"
            >Conseils</a
          >
        </li>
        <li>
          <a
            href="alumnis.html"
            class="inline-block px-4 py-1 hover:text-gray-400 transform transition-transform duration-200 hover:scale-110"
            >Alumnis</a
          >
        </li>
        <li>
          <a
            href="connexion.html"
            class="inline-block px-4 py-1 hover:text-gray-400 bg-gradient-to-tl font-semibold from-blue-300 to-blue-600 bg-clip-text text-transparent transform transition-transform duration-200 hover:scale-110"
            >Connexion</a
          >
        </li>
      </ul>
    </nav>
    <main>
      <div class="bg-gray-800 px-8 py-4 rounded-lg shadow-lg w-full max-w-sm">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">
          Connexion
        </h1>
        <form id="loginForm" class="space-y-4">
          <div>
            <label for="username" class="block mb-1">Nom d'utilisateur</label>
            <input
              type="text"
              id="username"
              class="w-full px-3 py-2 rounded bg-gray-700 text-white focus:outline-none"
              required
            />
          </div>
          <div>
            <label for="password" class="block mb-1">Mot de passe</label>
            <input
              type="password"
              id="password"
              class="w-full px-3 py-2 rounded bg-gray-700 text-white focus:outline-none"
              required
            />
          </div>
          <button
            type="submit"
            class="w-full bg-blue-600 hover:bg-blue-400 text-white font-bold py-2 rounded transition"
          >
            Se connecter
          </button>
          <p id="loginMessage" class="text-center text-red-400 mt-2"></p>
        </form>
      </div>
    </main>
    <script src="../src/js/main.js"></script>
  </body>
</html>
