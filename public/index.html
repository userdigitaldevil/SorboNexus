<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accueil - SorboNexus</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="min-h-screen text-white bg-gradient-to-br from-gray-700 via-gray-800 to-gray-900"
  >
    <nav class="bg-gray-800 p-4">
      <ul class="flex space-x-4">
        <li>
          <a
            href="index.html"
            class="inline-block px-4 py-1 hover:text-gray-400 font-semibold text-blue-400 transform transition-transform duration-200 hover:scale-110"
            >Accueil</a
          >
        </li>
        <li>
          <a
            href="ressources.html"
            class="inline-block px-4 py-1 hover:text-gray-400 transform transition-transform duration-200 hover:scale-110"
            >Ressources</a
          >
        </li>
        <li>
          <a
            href="liens-utiles.html"
            class="inline-block px-4 py-1 hover:text-gray-400 transform transition-transform duration-200 hover:scale-110"
            >Liens Utiles</a
          >
        </li>
        <li>
          <a
            href="conseils.html"
            class="inline-block px-4 py-1 hover:text-gray-400 transform transition-transform duration-200 hover:scale-110"
            >Conseils</a
          >
        </li>
        <li>
          <a
            href="alumnis.html"
            class="inline-block px-4 py-1 hover:text-gray-400 transform transition-transform duration-200 hover:scale-110"
            >Alumnis</a
          >
        </li>
        <li>
          <a
            href="connexion.html"
            class="inline-block px-4 py-1 hover:text-gray-400 transform transition-transform duration-200 hover:scale-110"
            >Connexion</a
          >
        </li>
      </ul>
    </nav>
    <main class="flex flex-col items-center justify-center py-24 px-6">
      <h1 class="text-5xl font-extrabold mb-6 text-blue-400 drop-shadow-lg">
        Bienvenue sur SorboNexus
      </h1>
      <p class="text-lg text-gray-300 mb-8 max-w-2xl text-center">
        SorboNexus est votre portail vers les ressources, conseils, liens utiles
        et le réseau des alumnis de la communauté Sorbonne. Explorez, apprenez
        et connectez-vous !
      </p>
      <a
        href="ressources.html"
        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-all duration-300"
        >Découvrez nos ressources</a
      >
    </main>
  </body>
</html>
